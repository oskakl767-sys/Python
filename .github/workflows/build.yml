name: Build & Test Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile server.py
          echo "Syntax OK"

      - name: Import test
        run: |
          python -c "import flask; import flask_socketio; import telebot; import dotenv; print('All imports OK')"

      - name: Run health check simulation
        env:
          BOT_TOKEN: "test:fake_token_for_ci"
          ADMIN_IDS: "123456789"
          E2E_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
          LIVE_ACCESS_KEY: "test_access_key_12345"
        run: |
          timeout 10 python server.py &
          sleep 5
          curl -s http://localhost:5000/health || echo "Health check done"
          curl -s http://localhost:5000/ping || echo "Ping check done"
          kill %1 2>/dev/null || true
          echo "Server test completed"
